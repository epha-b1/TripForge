# ============================================================================
# DEVELOPMENT / ACCEPTANCE — NOT FOR PRODUCTION
# This file ships TEST_ONLY inline credentials so the entire stack boots
# from a fresh clone with a single `docker compose up --build` (or
# `./run_tests.sh`) — there is intentionally NO `.env` file, NO
# `${VAR:?…}` interpolation, and NO host-environment preamble required.
#
# All values are clearly marked TEST_ONLY_NOT_FOR_PRODUCTION so a
# copy-paste into a real deployment is unmistakable. The application
# server at `src/config/environment.ts` still validates length and
# rejects known-weak placeholders (`changeme`, `secret`, etc.) at
# startup, so a naive copy-paste of one of these literals into a real
# secret store would not bypass the runtime check.
#
# For production:
#   1. Replace JWT_SECRET with a fresh `openssl rand -hex 32` value.
#   2. Replace ENCRYPTION_KEY with a fresh `openssl rand -base64 24 | cut -c1-32`.
#   3. Replace MYSQL_*_PASSWORD with strong random values.
#   4. Set NODE_ENV=production.
#   5. Use Docker secrets / k8s Secret instead of environment literals.
# ============================================================================
services:
  api:
    build: .
    ports:
      # Host-side 3010 → container 3000 so the dev/acceptance compose rig
      # coexists with any other service that already binds 3000 on the
      # host. Inside the container the API still listens on 3000, which
      # is what `docker compose exec` and the healthcheck use.
      - "3010:3000"
    environment:
      NODE_ENV: "test"
      DATABASE_URL: "mysql://tripforge:TEST_ONLY_NOT_FOR_PRODUCTION_db@db:3306/tripforge"
      JWT_SECRET: "TEST_ONLY_NOT_FOR_PRODUCTION_jwt_secret_padding_to_64_chars_xx"
      ENCRYPTION_KEY: "TEST_ONLY_NOT_FOR_PRODUCTION__32"
      ACCESS_TOKEN_TTL: "1800"
      REFRESH_TOKEN_TTL: "1209600"
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      start_period: 15s
      retries: 5
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads
      - ./exports:/app/exports
      - ./models:/app/models
      # The canonical OpenAPI source `docs/api-spec.md` intentionally lives
      # at the project root (one directory above `repo/`), NOT inside
      # `repo/`. That means it is not part of the Docker build context and
      # cannot be `COPY`-ed in. Instead, we bind-mount it read-only at
      # runtime so `unit_tests/contract_sync.spec.ts` can load it from
      # inside the container. Docker Compose resolves relative volume
      # paths against the compose file's directory, so `../docs` resolves
      # to `project_bundle/docs` on CI and `~/108/docs` on the host —
      # matching the canonical project layout in both cases.
      - ../docs:/app/docs:ro
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

  db:
    # Pin MySQL 8.0 — the 8.4 LTS line removed `--default-authentication-plugin`,
    # breaking the Prisma client compatibility workaround for `mysql_native_password`.
    image: mysql:8.0
    # - mysql_native_password: Prisma's bundled mysql client doesn't yet
    #   speak `caching_sha2_password`, so we keep the legacy plugin.
    # - log_bin_trust_function_creators=ON: lets the Prisma migrate user
    #   create triggers/functions without requiring SUPER privileges.
    command:
      - "--default-authentication-plugin=mysql_native_password"
      - "--log-bin-trust-function-creators=ON"
    ports:
      - "3306:3306"
    environment:
      MYSQL_USER: "tripforge"
      MYSQL_PASSWORD: "TEST_ONLY_NOT_FOR_PRODUCTION_db"
      MYSQL_DATABASE: "tripforge"
      MYSQL_ROOT_PASSWORD: "TEST_ONLY_NOT_FOR_PRODUCTION_root"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10
    volumes:
      - mysqldata:/var/lib/mysql

volumes:
  mysqldata:
